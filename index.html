<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>山城蝶语 AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; }
        #startBtn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 10px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- 启动按钮：解决自动播放拦截 -->
    <button id="startBtn">点击启动 AR 蝴蝶</button>

    <a-scene arjs style="display: none;" id="arScene">
        <a-marker type="hiro">
            <a-entity 
                gltf-model="src: butterfly.glb" 
                scale="0.3 0.3 0.3" 
                position="0 0.5 0"
                animation-mixer
            ></a-entity>
        </a-marker>

        <a-assets>
            <audio id="voice" src="voice.mp3" preload="auto">
        </a-assets>

        <a-entity camera></a-entity>
        <a-light type="ambient" intensity="1"></a-light>
    </a-scene>

    <script>
        const startBtn = document.getElementById('startBtn');
        const arScene = document.getElementById('arScene');
        const audio = document.getElementById('voice');
        const marker = arScene.querySelector('a-marker');

        // 点击按钮：启动摄像头 + 解锁音频
        startBtn.onclick = function() {
            startBtn.style.display = 'none';
            arScene.style.display = 'block';
            // 先触发空播放，解锁音频权限
            audio.play().then(() => audio.pause()).catch(() => {});
        };

        // 识别到标记再播放音频
        marker.addEventListener('markerFound', () => {
            audio.currentTime = 0;
            audio.play();
        });

        marker.addEventListener('markerLost', () => {
            audio.pause();
            audio.currentTime = 0;
        });
    </script>
</body>
</html>
