<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <title>山城蝶语AR</title>
    <style>
        * { margin:0; padding:0; }
        body { overflow:hidden; background:#000; }
        canvas { display:block; width:100vw; height:100vh; position:fixed; top:0; left:0; z-index:10; }
        video { position:fixed; top:0; left:0; width:100vw; height:100vh; object-fit:cover; z-index:0; }
    </style>
</head>
<body>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// --------------------------
// 你只需要改这 2 个地址！
// --------------------------
const MODEL_URL = "https://替换成你的模型链接.glb";
const AUDIO_URL = "https://替换成你的语音链接.mp3";

// 1. 场景
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ alpha:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.set(0, 0, 2);

// 2. 自动打开摄像头
const video = document.createElement('video');
video.autoplay = true;
video.playsInline = true;
document.body.appendChild(video);

navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
  video.srcObject = stream;
  video.play();
});

// 3. 自动加载蝴蝶模型
const loader = new GLTFLoader();
loader.load(MODEL_URL, (gltf) => {
  const m = gltf.scene;
  m.scale.set(1,1,1);
  scene.add(m);
});

// 4. 自动播放语音
const audio = new Audio(AUDIO_URL);
audio.volume = 1;
audio.play().catch(() => {
  document.body.addEventListener('click',()=>audio.play(),{once:true})
});

// 循环渲染
function loop(){
  requestAnimationFrame(loop);
  renderer.render(scene, camera);
}
loop();
</script>

</body>
</html>
