<!DOCTYPE html>
<html>
  <head>
    <title>山城蝶语AR</title>
    <!-- 引入AR.js和A-Frame -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- 场景：使用Hiro Marker识别图 -->
    <a-scene
      arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <!-- 识别图锚点：Hiro Marker的位置 -->
      <a-marker type="hiro">
        <!-- 3D蝴蝶模型：放在识别图上方 -->
        <a-entity
          id="butterfly"
          gltf-model="#butterflyModel"
          scale="0.5 0.5 0.5"
          position="0 1 0"
          animation-mixer="clip: *"
        ></a-entity>
      </a-marker>

      <!-- 加载3D模型和音频资源 -->
      <a-assets>
        <a-asset-item id="butterflyModel" src="butterfly.glb"></a-asset-item>
        <audio id="dialectAudio" src="dialect.mp3" preload="auto">
      </a-assets>

      <!-- 相机和光源 -->
      <a-entity camera></a-entity>
      <a-light type="ambient" color="#fff"></a-light>
    </a-scene>

    <!-- 播放方言音频的脚本 -->
    <script>
      // 当页面加载完成后执行
      document.addEventListener('DOMContentLoaded', function () {
        const marker = document.querySelector('a-marker[type="hiro"]');
        const audio = document.getElementById('dialectAudio');

        // 当识别到Marker时，播放音频
        marker.addEventListener('markerFound', function () {
          audio.play();
        });

        // 当Marker消失时，暂停音频
        marker.addEventListener('markerLost', function () {
          audio.pause();
          audio.currentTime = 0;
        });
      });
    </script>
  </body>

</html>
